name: production

on:
  push:
    branches: ["main"]
    # Docs-only merges must not rebuild (and auto-redeploy) production.
    # Use "Run workflow" if you ever need to force a build.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/**"
      - ".gitattributes"
      - ".gitignore"
      - ".editorconfig"
      - "LICENSE"
      - ".env.example"
      - "docker-compose.yml"
      - "services/livekit/livekit.yaml"
  workflow_dispatch:

# Least privilege by default; jobs widen only what they need.
permissions:
  contents: read

# Only the newest push to main should hold the production approval gate.
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  # 1) Build + push IMMUTABLE tags only (latest-<ts>, latest-<sha7>).
  #    The floating `latest` tag is NOT moved here — that is gated below.
  #    No `environment:` so this runs un-gated; Docker Hub creds are org-level.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sha7: ${{ steps.meta.outputs.sha }}
      ts: ${{ steps.meta.outputs.ts }}
      image: ${{ steps.img.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compute image tag
        id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "ts=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Resolve image name
        id: img
        run: echo "image=${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push immutable tags
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.sha }}
            BUILD_TIME=${{ steps.meta.outputs.built_at }}
          tags: |
            ${{ steps.img.outputs.image }}:latest-${{ steps.meta.outputs.ts }}
            ${{ steps.img.outputs.image }}:latest-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 1b) Scan the freshly-built image for OS/dependency vulns. Report-only for
  #     now (SARIF → Security tab); flip exit-code to 1 to gate once triaged.
  scan-image:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload SARIF
        if: ${{ always() && hashFiles('trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # 1c) Supply chain: SBOM (SPDX + CycloneDX), keyless Cosign signature +
  #     SBOM attestation on the digest, and SLSA build provenance. All keyed
  #     to the immutable digest that release-production will promote.
  sbom-sign:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # keyless cosign + provenance OIDC
      attestations: write   # actions/attest-build-provenance
    env:
      IMAGE_DIGEST: ${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate SBOM (SPDX + CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE_DIGEST }}
          output-file: sbom.spdx.json
          format: spdx-json

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE_DIGEST }}
          output-file: sbom.cdx.json
          format: cyclonedx-json

      - name: Upload SBOM artifacts (audit, 90d)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ needs.build.outputs.sha7 }}
          path: |
            sbom.spdx.json
            sbom.cdx.json
          retention-days: 90

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image (keyless) + attest SBOM
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE_DIGEST}"
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json "${IMAGE_DIGEST}"

      - name: Attest SLSA build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ needs.build.outputs.image }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: false

  # 2) APPROVAL GATE: verify the signature, then move the floating `latest`
  #    tag (what Watchtower pulls) to the built+signed digest. Requires a
  #    reviewer on the `production` GitHub Environment.
  release-production:
    needs: [build, scan-image, sbom-sign]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Verify the image signature came from this repo's CI
        run: |
          set -euo pipefail
          cosign verify "${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}" \
            --certificate-identity-regexp "^https://github.com/MGM-Laboratory/mgm-atlas-backend/\.github/workflows/.+@refs/heads/main$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" > /dev/null
          echo "Signature verified."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Promote digest to :latest
        run: |
          IMAGE='${{ needs.build.outputs.image }}'
          DIGEST='${{ needs.build.outputs.digest }}'
          echo "Promoting ${IMAGE}@${DIGEST} -> ${IMAGE}:latest"
          docker buildx imagetools create -t "${IMAGE}:latest" "${IMAGE}@${DIGEST}"

  # 2b) Deterministic converge: after the gated retag, recreate the container
  #     on the host via compose so we don't depend on Watchtower's non-atomic
  #     update (which once stranded the container on a daemon timeout). Joins
  #     the tailnet ephemerally, then SSHes in. Inert until DEPLOY_CONVERGE_ENABLED
  #     is set — see docs/deploy-converge-setup.md. Watchtower remains the
  #     fallback, and verify-deploy below is the safety net either way.
  converge:
    needs: [build, release-production]
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_CONVERGE_ENABLED == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Connect to tailnet (ephemeral node)
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade # v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Recreate backend on the production host
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          COMPOSE_DIR: /home/user/docker/mgm-atlas-backend
          SERVICE: atlas-backend
        run: |
          set -euo pipefail
          umask 077
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$RUNNER_TEMP/deploy_key"
          chmod 600 "$RUNNER_TEMP/deploy_key"
          ssh -i "$RUNNER_TEMP/deploy_key" -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${COMPOSE_DIR}' && docker compose pull '${SERVICE}' && docker compose up -d '${SERVICE}'"

  # 3) Confirm the new SHA is actually serving (covers both converge and the
  #    Watchtower fallback), then smoke. Runs whether converge ran or was skipped.
  verify-deploy:
    needs: [build, release-production, converge]
    if: ${{ always() && needs.release-production.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Wait for production to report the new commit
        run: |
          set -euo pipefail
          want='${{ needs.build.outputs.sha7 }}'
          url='https://atlas.labmgm.org/api/v1/version'
          echo "Waiting for $url to report sha=$want (up to 20 min)…"
          for i in $(seq 1 40); do
            got="$(curl -fsS --max-time 10 "$url" | sed -n 's/.*"sha":"\([^"]*\)".*/\1/p' || true)"
            echo "[$i] reported sha=${got:-<none>}"
            if [ "$got" = "$want" ]; then echo "Converged."; exit 0; fi
            sleep 30
          done
          echo "::error::Production did not converge on sha=$want within 20 minutes"
          exit 1

      - name: Smoke test (health + key routes)
        run: |
          set -euo pipefail
          health="$(curl -fsS --max-time 10 https://atlas.labmgm.org/api/v1/health)"
          echo "health: $health"
          echo "$health" | grep -q '"database":{"status":"up"}' || { echo "::error::DB not up"; exit 1; }
          echo "$health" | grep -q '"status":"ok"' || { echo "::error::health not ok"; exit 1; }
          for path in / /login; do
            code="$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 10 -A 'atlas-ci-smoke' "https://atlas.labmgm.org${path}")"
            echo "GET ${path} -> ${code}"
            [ "$code" = "200" ] || { echo "::error::${path} returned ${code}"; exit 1; }
          done
          echo "Smoke OK."
