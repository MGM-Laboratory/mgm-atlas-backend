name: production

on:
  push:
    branches: ["main"]
    # Docs-only merges must not rebuild (and auto-redeploy) production.
    # Use "Run workflow" if you ever need to force a build.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/**"
      - ".gitattributes"
      - ".gitignore"
      - ".editorconfig"
      - "LICENSE"
      - ".env.example"
      - "docker-compose.yml"
      - "services/livekit/livekit.yaml"
  workflow_dispatch:

# Least privilege by default; jobs widen only what they need.
permissions:
  contents: read

# Only the newest push to main should hold the production approval gate.
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  # 1) Build + push IMMUTABLE tags only (latest-<ts>, latest-<sha7>).
  #    The floating `latest` tag is NOT moved here — that is gated below.
  #    No `environment:` so this runs un-gated; Docker Hub creds are org-level.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sha7: ${{ steps.meta.outputs.sha }}
      ts: ${{ steps.meta.outputs.ts }}
      image: ${{ steps.img.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compute image tag
        id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "ts=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Resolve image name
        id: img
        run: echo "image=${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push immutable tags
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.sha }}
            BUILD_TIME=${{ steps.meta.outputs.built_at }}
          tags: |
            ${{ steps.img.outputs.image }}:latest-${{ steps.meta.outputs.ts }}
            ${{ steps.img.outputs.image }}:latest-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2) APPROVAL GATE: move the floating `latest` tag (what Watchtower pulls)
  #    to the freshly-built digest. Requires a reviewer on the `production`
  #    GitHub Environment, so production only changes after a human approves.
  release-production:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Promote digest to :latest
        run: |
          IMAGE='${{ needs.build.outputs.image }}'
          DIGEST='${{ needs.build.outputs.digest }}'
          echo "Promoting ${IMAGE}@${DIGEST} -> ${IMAGE}:latest"
          docker buildx imagetools create -t "${IMAGE}:latest" "${IMAGE}@${DIGEST}"

  # 3) Wait for Watchtower on keikaku to converge onto the new SHA, then smoke.
  verify-deploy:
    needs: [build, release-production]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Wait for production to report the new commit
        run: |
          set -euo pipefail
          want='${{ needs.build.outputs.sha7 }}'
          url='https://atlas.labmgm.org/api/v1/version'
          echo "Waiting for $url to report sha=$want (up to 20 min)…"
          for i in $(seq 1 40); do
            got="$(curl -fsS --max-time 10 "$url" | sed -n 's/.*"sha":"\([^"]*\)".*/\1/p' || true)"
            echo "[$i] reported sha=${got:-<none>}"
            if [ "$got" = "$want" ]; then echo "Converged."; exit 0; fi
            sleep 30
          done
          echo "::error::Production did not converge on sha=$want within 20 minutes"
          exit 1

      - name: Smoke test (health + key routes)
        run: |
          set -euo pipefail
          health="$(curl -fsS --max-time 10 https://atlas.labmgm.org/api/v1/health)"
          echo "health: $health"
          echo "$health" | grep -q '"database":{"status":"up"}' || { echo "::error::DB not up"; exit 1; }
          echo "$health" | grep -q '"status":"ok"' || { echo "::error::health not ok"; exit 1; }
          for path in / /login; do
            code="$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 10 -A 'atlas-ci-smoke' "https://atlas.labmgm.org${path}")"
            echo "GET ${path} -> ${code}"
            [ "$code" = "200" ] || { echo "::error::${path} returned ${code}"; exit 1; }
          done
          echo "Smoke OK."
