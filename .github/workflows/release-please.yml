name: release-please

# Maintains a release PR that bumps the version + CHANGELOG from Conventional
# Commits. Merging it tags vX.Y.Z and cuts a GitHub Release; release-assets.yml
# then attaches the SBOM and adds the immutable vX.Y.Z Docker tag.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
