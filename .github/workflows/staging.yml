name: staging

on:
  pull_request:
    branches: ["*"]
    # Docs-only changes never need a staging image. Use "Run workflow" if
    # you ever need to force a build.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/**"
      - ".gitattributes"
      - ".gitignore"
      - ".editorconfig"
      - "LICENSE"
      - ".env.example"
      - "docker-compose.yml"
      - "services/livekit/livekit.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compute image tag
        id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "ts=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.sha }}
            BUILD_TIME=${{ steps.meta.outputs.built_at }}
          tags: |
            ${{ vars.DOCKERHUB_USERNAME}}/${{ vars.IMAGE_NAME }}:staging
            ${{ vars.DOCKERHUB_USERNAME}}/${{ vars.IMAGE_NAME }}:staging-${{ steps.meta.outputs.ts }}
            ${{ vars.DOCKERHUB_USERNAME}}/${{ vars.IMAGE_NAME }}:staging-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
