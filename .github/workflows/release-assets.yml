name: release-assets

# On a published release (cut by release-please), attach the SBOM and add an
# immutable vX.Y.Z Docker tag pointing at that commit's built image digest.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)build assets for, e.g. v0.2.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload release assets
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Resolve image + sha
        id: meta
        run: |
          set -euo pipefail
          echo "sha7=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
          echo "image=${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Wait for the release image (built by production.yml on the same merge)
        id: img
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          SHA7: ${{ steps.meta.outputs.sha7 }}
        run: |
          set -euo pipefail
          ref="${IMAGE}:latest-${SHA7}"
          for i in $(seq 1 30); do
            if docker buildx imagetools inspect "$ref" >/dev/null 2>&1; then
              echo "found=$ref"; echo "ref=$ref" >> "$GITHUB_OUTPUT"; exit 0
            fi
            echo "[$i] waiting for $ref…"; sleep 20
          done
          echo "::warning::release image $ref not found yet; skipping asset attach"
          echo "ref=" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM from the release image
        if: ${{ steps.img.outputs.ref != '' }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ steps.img.outputs.ref }}
          output-file: sbom.spdx.json
          format: spdx-json

      - name: Attach SBOM to the GitHub Release
        if: ${{ steps.img.outputs.ref != '' && env.RELEASE_TAG != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${RELEASE_TAG}" sbom.spdx.json --clobber

      - name: Add immutable vX.Y.Z Docker tag
        if: ${{ steps.img.outputs.ref != '' }}
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          REF: ${{ steps.img.outputs.ref }}
        run: |
          set -euo pipefail
          echo "Tagging ${IMAGE}:${RELEASE_TAG} -> ${REF}"
          docker buildx imagetools create -t "${IMAGE}:${RELEASE_TAG}" "${REF}"
