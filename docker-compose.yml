# MGM Atlas — backend deploy compose.
# PostgreSQL is intentionally NOT defined here — it lives on a separate host
# and is reached via DATABASE_URL.
#
# Usage on a deploy target:
#   docker compose pull
#   docker compose up -d

services:
  atlas-backend:
    image: ${IMAGE:-labmgm/atlas-backend:latest}
    container_name: atlas-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
