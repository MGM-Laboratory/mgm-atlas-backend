services:
  atlas-backend:
    image: labmgm/mgm-atlas-backend:latest
    container_name: atlas-backend
    restart: always
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-3000}:${PORT}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${HOST_PORT}/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Yjs sync sidecar for PMO notes + whiteboards collab. Phase 0 ships a
  # stub server; auth-callback wiring lands in Phase 8. The backend boots
  # fine without this container, so it can be added to the running stack
  # at any time without coordination.
  atlas-y-websocket:
    image: labmgm/atlas-y-websocket:latest
    container_name: atlas-y-websocket
    restart: always
    environment:
      PORT: 1234
      # Filled in Phase 8 — used to verify HMAC headers from the backend
      # on the auth/snapshot callbacks. Empty in Phase 0 is fine; the
      # stub server doesn't read it yet.
      YJS_INTERNAL_AUTH_SECRET: ${YJS_INTERNAL_AUTH_SECRET:-}
      ATLAS_BACKEND_BASE_URL: ${APP_BASE_URL}/api/v1
    ports:
      - "${YJS_HOST_PORT:-1234}:1234"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:1234/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # LiveKit SFU for Atlas voice chat (Phase 0). Backend boots without
  # this container — LivekitService.isAvailable() returns false and the
  # /voice/* routes report unavailable rather than crash.
  #
  # Network topology: keikaku has no public IP. The subnet-router VPS
  # (public IP 103.196.153.62, runs nginx) forwards both signaling
  # (HTTP/WSS via the http block) and media (UDP+TCP/7882 via the
  # stream {} block) over Tailscale to this container. Media uses
  # UDP Mux on a single port — see services/livekit/livekit.yaml.
  atlas-livekit:
    image: livekit/livekit-server:latest
    container_name: atlas-livekit
    restart: always
    command:
      - --config
      - /etc/livekit.yaml
    environment:
      # 'apikey: apisecret' — LiveKit merges this with the (empty) keys
      # block in livekit.yaml. Both vars must be set in the backend .env.
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    env_file:
      - .env
    volumes:
      - ./services/livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      # Signaling — VPS nginx proxies wss://atlas.labmgm.org/livekit here.
      - "${LIVEKIT_HOST_PORT:-7880}:7880"
      # UDP Mux: one port carries every room's media. VPS nginx stream {}
      # forwards UDP+TCP/7882 over Tailscale to here. The TCP listener
      # is the in-network fallback for UDP-blocked clients.
      - "7882:7882/udp"
      - "7882:7882"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7880/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # LiveKit Egress worker for Atlas voice chat recording (Phase 7).
  # Records room composite egress to S3 via the EgressClient calls
  # the backend makes (POST /voice/channels/:id/recording/start).
  # Backend boots fine without this container — startRoomCompositeEgress
  # then returns null and the controller surfaces a clean 503.
  #
  # The egress worker needs:
  #   - LIVEKIT_WS_URL : ws://atlas-livekit:7880 (SFU on the docker network)
  #   - LIVEKIT_API_KEY / LIVEKIT_API_SECRET : same as the SFU's keys
  #   - REDIS_URL : coordinates with the SFU; reuses the keikaku Redis
  #
  # The container ships Chromium for room composite rendering — needs
  # ~1GB RAM headroom. Keikaku has plenty.
  atlas-livekit-egress:
    image: livekit/egress:latest
    container_name: atlas-livekit-egress
    restart: always
    environment:
      # Egress reads its config from EGRESS_CONFIG_BODY (YAML inline)
      # so we don't have to mount a file.
      EGRESS_CONFIG_BODY: |
        log_level: info
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://atlas-livekit:7880
        redis:
          address: mgm-atlas-redis:6379
        # S3 creds default to the AWS env vars (set in .env) so we don't
        # have to duplicate them here. EncodedFileOutput in the start
        # request also carries its own copy as a belt-and-suspenders.
    healthcheck:
      test: ["CMD", "egress", "--health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    cap_add:
      # Chromium sandbox needs SYS_ADMIN. Required by livekit/egress.
      - SYS_ADMIN
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
