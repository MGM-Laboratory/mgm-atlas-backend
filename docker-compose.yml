services:
  atlas-backend:
    image: labmgm/mgm-atlas-backend:latest
    container_name: atlas-backend
    restart: always
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-3000}:${PORT}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${HOST_PORT}/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
