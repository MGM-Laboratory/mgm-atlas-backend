# LiveKit server configuration for Atlas voice chat.
#
# Runs on keikaku alongside atlas-backend / atlas-y-websocket. Loaded by
# the upstream livekit/livekit-server image via `--config /etc/livekit.yaml`.
# Phase 0 ships this file; the container is added to docker-compose.yml
# alongside this. The backend boots fine without LiveKit (gracefully
# degrades via LivekitService.isAvailable()), so the container can be
# brought up at any time without coordination.
#
# Ports:
#   7880/tcp  — HTTP API + WebSocket signaling (proxied as /livekit/ on
#               atlas.labmgm.org)
#   7881/tcp  — TCP fallback for clients behind UDP-blocking firewalls
#               that can't use TURN-TLS
#   50000-50100/udp — RTC media (open these to keikaku at the VPS firewall)
#   5349/tcp  — TURN-over-TLS listener (proxied at turn.atlas.labmgm.org:443
#               for corporate-firewall traversal — HARD REQUIREMENT)

port: 7880

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  # use_external_ip ensures LiveKit advertises the public IP of the VPS
  # (not keikaku's Tailscale-internal address) in ICE candidates so
  # browsers can actually reach the media ports.
  use_external_ip: true

# Webhook deliveries to the Atlas backend. Backend verifies via
# LIVEKIT_WEBHOOK_KEY (HMAC).
webhook:
  api_key: ${LIVEKIT_API_KEY}
  urls:
    - http://atlas-backend:3000/api/v1/voice/livekit/webhook

# API keys. In compose this is templated from .env so the same secret is
# shared with the backend's LIVEKIT_API_KEY / LIVEKIT_API_SECRET.
keys:
  ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}

# TURN-over-TLS — HARD REQUIREMENT for corporate-firewall traversal.
# The VPS nginx terminates TLS at turn.atlas.labmgm.org:443 and proxies
# to keikaku:5349. LiveKit itself only sees plain TCP.
turn:
  enabled: true
  domain: turn.atlas.labmgm.org
  tls_port: 5349
  # Loadbalancer-style: TLS is terminated upstream (nginx), so LiveKit
  # serves plain TCP here. Do NOT supply cert_file/key_file — the nginx
  # block in ~/lab/atlas/nginx.conf provides them.

# Room defaults. Per-channel `audioQuality` (LOW/STANDARD/HIGH) maps to
# different audio bitrate targets enforced client-side at publish time.
room:
  enabled_codecs:
    - mime: audio/opus
    - mime: video/vp8
    - mime: video/h264
  # Max participants per room is enforced application-side (channel
  # userLimit). LiveKit's hard cap stays generous.
  max_participants: 100
  empty_timeout: 300 # delete empty room after 5min
  departure_timeout: 20 # delete after last participant leaves

# Logging
logging:
  level: info
  pion_level: warn
  json: true
