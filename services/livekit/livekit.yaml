# LiveKit server config for Atlas voice chat (Phase 0).
#
# Architecture: the app host has no public IP of its own. Public traffic
# reaches LiveKit via the reverse proxy in front of it, which proxies
# signaling (WSS) over /livekit/ and forwards UDP/TCP/7882 to this
# container.
#
# UDP Mux: a single UDP port (7882) carries ALL WebRTC media for ALL
# clients/rooms. LiveKit's built-in mux demultiplexes by session at the
# application layer. This means the proxy only needs to forward ONE UDP
# port (not the usual 50000-50100 range) and its firewall only needs
# ONE rule.

port: 7880

rtc:
  # Single UDP port for all media (UDP Mux).
  udp_port: 7882
  # TCP fallback for clients on UDP-blocking networks. Shares the same
  # 7882 port so the proxy only needs one stream rule to handle both.
  tcp_port: 7882
  # Skip STUN — LiveKit would otherwise discover this host's egress IP,
  # which is wrong (clients can't reach this host directly). Use the
  # explicit NAT 1:1 mapping below.
  use_external_ip: false
  # Tell LiveKit to advertise the proxy's public IP in ICE candidates
  # (clients send media to <proxy-public-ip>:7882, which the proxy
  # forwards to this container).
  node_ip: 103.196.153.62

# TURN-TLS is deferred to Phase 7 polish — UDP Mux on a single
# public port handles ~80%+ of real-world clients without needing
# TURN. Corporate-firewall traversal becomes a Phase 7 problem.

room:
  enabled_codecs:
    - mime: audio/opus
    - mime: video/vp8
    - mime: video/h264
  max_participants: 100
  empty_timeout: 300
  departure_timeout: 20

logging:
  level: info
  pion_level: warn
  json: true
