# LiveKit server config for Atlas voice chat (Phase 0).
#
# Architecture: keikaku is Tailscale-only (no public IP). Public traffic
# reaches LiveKit via the subnet-router VPS (public IP 103.196.153.62),
# which proxies signaling (WSS) over /livekit/ and forwards UDP/TCP/7882
# over Tailscale to this container.
#
# UDP Mux: a single UDP port (7882) carries ALL WebRTC media for ALL
# clients/rooms. LiveKit's built-in mux demultiplexes by session at the
# application layer. This means the VPS only needs to forward ONE UDP
# port (not the usual 50000-50100 range), the VPS firewall only needs
# ONE rule, and Tailscale only carries one UDP flow per concurrent
# participant.

port: 7880

rtc:
  # Single UDP port for all media (UDP Mux).
  udp_port: 7882
  # TCP fallback for clients on UDP-blocking networks. Shares the same
  # 7882 port so the VPS only needs one stream rule to handle both.
  tcp_port: 7882
  # Skip STUN — LiveKit would otherwise discover keikaku's egress IP,
  # which is wrong (clients can't reach keikaku directly). Use the
  # explicit NAT 1:1 mapping below.
  use_external_ip: false
  # Tell LiveKit to advertise the VPS public IP in ICE candidates
  # (clients send media to <VPS_PUBLIC_IP>:7882, which the VPS
  # forwards to us over Tailscale).
  node_ip: 103.196.153.62

# TURN-TLS is deferred to Phase 7 polish — UDP Mux on a single
# public port handles ~80%+ of real-world clients without needing
# TURN. Corporate-firewall traversal becomes a Phase 7 problem.

room:
  enabled_codecs:
    - mime: audio/opus
    - mime: video/vp8
    - mime: video/h264
  max_participants: 100
  empty_timeout: 300
  departure_timeout: 20

logging:
  level: info
  pion_level: warn
  json: true
